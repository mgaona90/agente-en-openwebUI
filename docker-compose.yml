services:

  agent:
    build: .
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    restart: unless-stopped
    ports:
      - "3000:8080"
    environment:
      - OPENAI_API_BASE_URL=http://agent:8000/v1
      - OPENAI_API_KEY=sk-dummy
    depends_on:
      - agent
    volumes:
      - openwebui-data:/app/backend/data

volumes:
  openwebui-data:
