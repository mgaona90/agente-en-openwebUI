# Agent manifest — used by register_agent.py to register the model in OpenWebUI.
# Required fields: name / team / owner / visibility / model

name: my-agent
team: my-team
owner: your-email@company.com
visibility: org         # "org" = visible to all authenticated users
model: claude-haiku-4-5-20251001
description: A Claude agent
runtime: claude-sdk

# MCP servers this agent is authorised to invoke.
# Empty = built-in tools only (Read / Glob / WebFetch).
mcp_servers: []
