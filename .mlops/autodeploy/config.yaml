app_type: fastapi

# Non-secret env vars injected into the container at runtime.
# Secrets (ANTHROPIC_API_KEY, Langfuse keys, etc.) should be stored in your
# secret manager (Vault, K8s Secrets, AWS Secrets Manager, etc.) — never here.
env_vars:
  LOG_LEVEL: "INFO"
  MAX_TURNS: "40"
  EXPOSE_TOOL_RESULTS: "false"

# Required secrets (set in your CI/CD pipeline or secret manager):
#   ANTHROPIC_API_KEY
#
# Optional secrets (Langfuse tracing):
#   LANGFUSE_PUBLIC_KEY
#   LANGFUSE_SECRET_KEY
#   LANGFUSE_HOST
#
# Optional secrets (OpenWebUI registration):
#   OPENWEBUI_URL
#   OPENWEBUI_ADMIN_KEY
