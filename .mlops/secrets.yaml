# .mlops/secrets.yaml
#
# Paths Vault que se materializan como K8s Secret (via VSO) y se inyectan al
# pod como envFrom. Los fields del secret en Vault deben llamarse como las
# env vars (UPPERCASE). Cada path debajo se monta como un K8s Secret separado.
#
# El path principal es mlops/apps/<slug>/{env} — {env} se reemplaza por
# dev/stg/prd a deploy time. CI mantiene el LITELLM_VIRTUAL_KEY ahí
# automáticamente (ver register_agent.py).
#
# Para agregar secrets adicionales propios del agente, escribilos en
# https://vault-mlops.scanntech.com bajo el mismo path principal — viajan
# en el mismo K8s Secret sin tocar este archivo.
#
# Shared Vault K8s-auth role used by every claude-agent-template agent.
# Tenant isolation comes from the templated policy attached to this role
# (mlops-app-templated resolves to the SA's slug at request time). Created
# once by MLOps; no per-agent Vault provisioning needed.
role: mlops-app
paths:
  - mlops/apps/e2e-test-agent6/{env}
  # Shared Langfuse keys for the `agents` Langfuse project. VSO materialises
  # a second K8s Secret with field names agents_project_api_public_key/
  # agents_project_api_secret_key; tracing.py reads them and maps to the
  # SDK-expected env vars. Updated values propagate cluster-wide; the agent
  # doesn't need redeploying when MLOps rotates the keys.
  - mlops/services/langfuse
